<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist</title>
  <meta
    name="description"
    content="Минималистичный wishlist с карточками, фотографиями, ценой и ссылками."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Cormorant+Garamond:wght@600&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <header class="intro">
      <p class="intro-label">Wishlist</p>
      <h1>Вещи, которые мне правда хочется получить</h1>
      <p class="intro-copy">
        Ничего лишнего. Только красивые карточки с фото, ценой и прямой ссылкой.
      </p>
    </header>

    <section class="wishlist-grid" id="wishlist-items" aria-label="Список желаний"></section>
  </main>

  <template id="wishlist-card-template">
    <article class="wish-card">
      <div class="wish-image-wrap">
        <img class="wish-image" alt="">
      </div>
      <div class="wish-content">
        <div class="wish-meta">
          <h2 class="wish-title"></h2>
          <p class="wish-price"></p>
        </div>
        <a class="wish-link" target="_blank" rel="noreferrer noopener">Смотреть</a>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
